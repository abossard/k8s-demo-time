# =============================================================================
# Step 6: Practical Resource Tuning — Finding the Right Values
# =============================================================================
# Deploy with deliberately low requests to see the gap between requested
# and actual usage. This is how you find the RIGHT resource values.
#
# After applying:
#   kubectl top pods -n resources-demo --containers
#   kubectl top pods -n resources-demo --sort-by=cpu
#   kubectl top pods -n resources-demo --sort-by=memory
#
# Generate some load to see realistic usage:
#   kubectl port-forward svc/demo-app-tune 8080:80 -n resources-demo
#   curl -X POST http://localhost:8080/api/stress/cpu \
#     -H "Content-Type: application/json" \
#     -d '{"minutes": 2, "targetPercentage": 30}'
#
# Watch usage climb:
#   watch -n 2 kubectl top pods -n resources-demo --containers
#
# Check the app's own metrics:
#   curl http://localhost:8080/metrics | grep process_
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-tune
  namespace: resources-demo
  labels:
    app: demo-app-tune
    qos-class: burstable
    tutorial-step: "06-tuning"
  annotations:
    tutorial.k8s-demo/lesson: "Set requests to typical usage (P50), limits to peak + headroom (P99 + 20%)"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app-tune
  template:
    metadata:
      labels:
        app: demo-app-tune
        qos-class: burstable
    spec:
      containers:
        - name: k8s-demo-app
          image: k8sdemoanbo.azurecr.io/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: SERVICE_NAME
              value: "demo-app-tune-headless"
            - name: RESOURCE_REQUEST_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: requests.cpu
            - name: RESOURCE_REQUEST_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: requests.memory
            - name: RESOURCE_LIMIT_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: limits.cpu
            - name: RESOURCE_LIMIT_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: limits.memory
          ports:
            - name: http
              containerPort: 8080
          # Deliberately low: watch actual usage vs requested
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            failureThreshold: 20
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 2
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-tune
  namespace: resources-demo
  labels:
    app: demo-app-tune
spec:
  selector:
    app: demo-app-tune
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-tune-headless
  namespace: resources-demo
  labels:
    app: demo-app-tune
spec:
  clusterIP: None
  selector:
    app: demo-app-tune
  ports:
    - name: http
      port: 8080
      targetPort: http
