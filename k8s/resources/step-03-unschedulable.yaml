# =============================================================================
# Step 3: The Unschedulable Pod — When Requests Exceed Capacity
# =============================================================================
# Deploy a pod requesting far more resources than any node can provide.
# Watch it stay Pending and learn to diagnose FailedScheduling events.
#
# After applying:
#   kubectl get pods -n resources-demo              # See: Pending
#   kubectl describe pod -l app=demo-app-greedy -n resources-demo
#   kubectl get events -n resources-demo --field-selector reason=FailedScheduling
#
# Fix it:
#   kubectl delete deployment demo-app-greedy -n resources-demo
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-greedy
  namespace: resources-demo
  labels:
    app: demo-app-greedy
    qos-class: burstable
    tutorial-step: "03-unschedulable"
  annotations:
    tutorial.k8s-demo/lesson: "Requesting more resources than any node has = Pending forever"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app-greedy
  template:
    metadata:
      labels:
        app: demo-app-greedy
        qos-class: burstable
    spec:
      containers:
        - name: k8s-demo-app
          image: k8sdemoanbo.azurecr.io/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: SERVICE_NAME
              value: "demo-app-headless"
            - name: RESOURCE_REQUEST_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: requests.cpu
            - name: RESOURCE_REQUEST_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: requests.memory
            - name: RESOURCE_LIMIT_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: limits.cpu
            - name: RESOURCE_LIMIT_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: limits.memory
          ports:
            - name: http
              containerPort: 8080
          # Deliberately excessive: no single node will have 8 CPUs and 32Gi free
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            failureThreshold: 20
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 2
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
