# =============================================================================
# Step 5: Resource Quotas and LimitRanges — Namespace-Level Governance
# =============================================================================
# Protect your cluster from greedy workloads with quotas and default limits.
#
# After applying:
#   kubectl describe resourcequota resource-budget -n resources-demo
#   kubectl describe limitrange default-limits -n resources-demo
#
# Try to exceed them:
#   kubectl scale deployment demo-app-quota-test --replicas=8 -n resources-demo
#   kubectl get events -n resources-demo --field-selector reason=FailedCreate
#
# Watch quota usage:
#   kubectl get resourcequota resource-budget -n resources-demo -o yaml
# =============================================================================

# --- ResourceQuota: Cap the total resources the namespace can consume ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: resource-budget
  namespace: resources-demo
  labels:
    tutorial-step: "05-quotas"
  annotations:
    tutorial.k8s-demo/lesson: "Quotas cap the total resource consumption for a namespace"
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "2Gi"
    limits.cpu: "4"
    limits.memory: "4Gi"
    pods: "6"
---
# --- LimitRange: Set defaults and caps for individual containers ---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: resources-demo
  labels:
    tutorial-step: "05-quotas"
  annotations:
    tutorial.k8s-demo/lesson: "LimitRanges set defaults and caps per container"
spec:
  limits:
    - type: Container
      default:
        cpu: "200m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "1"
        memory: "1Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
---
# --- Test deployment: try to create 3 replicas within quota ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-quota-test
  namespace: resources-demo
  labels:
    app: demo-app-quota-test
    tutorial-step: "05-quotas"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-app-quota-test
  template:
    metadata:
      labels:
        app: demo-app-quota-test
    spec:
      containers:
        - name: k8s-demo-app
          image: k8sdemoanbo.azurecr.io/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: SERVICE_NAME
              value: "demo-app-headless"
            - name: RESOURCE_REQUEST_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: requests.cpu
            - name: RESOURCE_REQUEST_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: requests.memory
            - name: RESOURCE_LIMIT_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: limits.cpu
            - name: RESOURCE_LIMIT_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: limits.memory
          ports:
            - name: http
              containerPort: 8080
          # Moderate resources — 3 replicas × 200m/256Mi = 600m/768Mi (within quota)
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            failureThreshold: 20
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 2
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
