# =============================================================================
# Step 1: Deploy and Observe — See Resources in Action
# =============================================================================
# Deploy a standard Burstable QoS workload and learn to read resource info.
#
# After applying:
#   kubectl get pods -n resources-demo -o wide
#   kubectl top pods -n resources-demo
#   kubectl top nodes
#   kubectl describe node <node> | grep -A 20 "Allocated resources"
#
# Open the dashboard to see the QoS badge and resource info:
#   kubectl port-forward svc/demo-app 8080:80 -n resources-demo
#   open http://localhost:8080
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: resources-demo
  labels:
    tutorial.k8s-demo/component: resources
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: resources-demo
  labels:
    app: demo-app
    qos-class: burstable
    tutorial-step: "01-observe"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        qos-class: burstable
    spec:
      containers:
        - name: k8s-demo-app
          image: k8sdemoanbo.azurecr.io/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: SERVICE_NAME
              value: "demo-app-headless"
            - name: CLUSTER_NAME
              value: "demo-cluster"
            - name: CLUSTER_DOMAIN
              value: "cluster.local"
            - name: RESOURCE_REQUEST_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: requests.cpu
            - name: RESOURCE_REQUEST_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: requests.memory
            - name: RESOURCE_LIMIT_CPU
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: limits.cpu
            - name: RESOURCE_LIMIT_MEMORY
              valueFrom:
                resourceFieldRef:
                  containerName: k8s-demo-app
                  resource: limits.memory
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            failureThreshold: 20
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 2
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: resources-demo
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80
      targetPort: http
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-headless
  namespace: resources-demo
  labels:
    app: demo-app
spec:
  clusterIP: None
  selector:
    app: demo-app
  ports:
    - name: http
      port: 8080
      targetPort: http
