##############################################################################
# Step 5: KEDA — Event-driven autoscaling with Prometheus trigger
# Replaces the manual HPA with a KEDA ScaledObject.
# Scales on http_server_active_requests from the app's /metrics endpoint.
# Supports scale-to-zero for cost savings.
#
# Prerequisites: KEDA must be installed (see README for Helm commands).
# Important: Delete any existing HPA on demo-app before applying this.
##############################################################################
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: demo-app-scaledobject
  namespace: scaling-demo
  labels:
    app: demo-app
    tutorial: scaling-journey
    step: "05-keda"
spec:
  scaleTargetRef:
    name: demo-app
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 300
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 3
              periodSeconds: 60
            - type: Percent
              value: 100
              periodSeconds: 60
          selectPolicy: Max
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://opencost-prometheus-server.opencost.svc.cluster.local:80
        query: sum(http_server_active_requests{namespace="scaling-demo"})
        threshold: "10"
        activationThreshold: "1"
