# Cleanup all VPA demo resources
# Usage: kubectl delete -f k8s/vpa/step-07-cleanup.yaml
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: k8s-demo-app-vpa
  namespace: vpa-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-demo-app-vpa
  namespace: vpa-demo
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-demo-app-vpa
  namespace: vpa-demo
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-demo-app-headless
  namespace: vpa-demo
---
apiVersion: v1
kind: Namespace
metadata:
  name: vpa-demo
