# Cleanup: kubectl delete -f k8s/qos/step-06-cleanup.yaml
# This removes the qos-demo namespace (and all resources within it)
# plus the cluster-scoped PriorityClasses created in step-05.
---
apiVersion: v1
kind: Namespace
metadata:
  name: qos-demo
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000000
globalDefault: false
description: "Cleanup placeholder"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: medium-priority
value: 500000
globalDefault: false
description: "Cleanup placeholder"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: low-priority
value: 100000
globalDefault: false
description: "Cleanup placeholder"
